# frontend/nginx.conf — sert le SPA React et proxifie l'API REST + le WebSocket STOMP vers le backend.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Aligné sur la limite multipart du backend (upload CSV/SHP/ZIP d'initialisation).
    client_max_body_size 200M;

    # SPA : toutes les routes inconnues retombent sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API REST → backend
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket STOMP (progression des runs) → backend
    location /ws {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Cache des assets statiques
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
