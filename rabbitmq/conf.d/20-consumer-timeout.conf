# Plateforme MAELIA — un run = un message AMQP tenu pendant TOUTE la durée de la
# simulation (WebSocket GAMA persistante, ack à la fin). Le consumer_timeout par
# défaut de RabbitMQ (30 min = 1800000 ms) tue le canal sur les runs longs et
# rejoue le message en boucle. On le porte au-dessus de gama.run-timeout-seconds
# (7200 s = 2 h) : 3 h de marge.
consumer_timeout = 10800000
